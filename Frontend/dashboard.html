<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dutch Boy - Panel Principal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-blue-700 text-white shadow-md px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-wide">The Dutch Boy - Sistema de Gestión</h1>
        <div class="flex items-center space-x-4">
            <span id="userDisplay" class="text-sm bg-blue-800 px-3 py-1 rounded-full font-medium">Usuario</span>
            <button id="logoutBtn" class="bg-red-500 hover:bg-red-600 text-white text-xs font-semibold py-1.5 px-3 rounded transition-colors shadow">
                Cerrar Sesión
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto mt-10 px-4">
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-2xl font-bold text-gray-800 mb-2">¡Bienvenido al Panel de Control!</h2>
            <p class="text-gray-600">Has autenticado correctamente. Aquí se desplegarán los módulos de reportes próximamente.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
    
    <div class="bg-white p-6 rounded-lg shadow border-l-4 border-green-500">
        <p class="text-sm font-medium text-gray-500 uppercase">Transacciones Totales</p>
        <p id="totalTransacciones" class="text-3xl font-bold text-gray-800 mt-1">...</p>
    </div>

    <div class="bg-white p-6 rounded-lg shadow border-l-4 border-purple-500 flex flex-col justify-between">
        <div>
            <p class="text-sm font-medium text-gray-500 uppercase">Mis Ahorros</p>
            <p id="total_ahorros" class="text-3xl font-bold text-purple-700 mt-1">$ 350.50</p>
        </div>
        <div class="mt-4">
            <button id="btn_agregar" class="w-full bg-purple-600 hover:bg-purple-700 text-white text-xs font-semibold py-2 px-3 rounded transition-colors shadow">
                + Agregar Dinero
            </button>
        </div>
    </div>

    <div class="bg-white p-6 rounded-lg shadow border-l-4 border-blue-500">
        <p class="text-sm font-medium text-gray-500 uppercase">Reportes Generados</p>
        <p class="text-3xl font-bold text-gray-800 mt-1">42</p>
    </div>

    <div class="bg-white p-6 rounded-lg shadow border-l-4 border-amber-500">
        <p class="text-sm font-medium text-gray-500 uppercase">Estado del Sistema</p>
        <p class="text-xl font-semibold text-green-600 mt-2">● En Línea</p>
    </div>

</div>
    </main>

    <script>
    
    let saldoAhorros = 350.50; 

    
    const txtAhorros = document.getElementById('total_ahorros');
    const btnAgregar = document.getElementById('btn_agregar');
    const txtTransacciones = document.getElementById('totalTransacciones');

    if (btnAgregar && txtAhorros) {
        btnAgregar.addEventListener('click', () => {
            saldoAhorros += 10.00; 
            txtAhorros.textContent = `$ ${saldoAhorros.toFixed(2)}`; 
            console.log("Dinero sumado con éxito. Nuevo saldo:", saldoAhorros);
        });
    }

    
    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = 'index.html';
    }

    
    async function cargarMetricas() {
        try {
            const response = await fetch('http://127.0.0.1:8000/reports/summary', {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            });

            if (response.ok) {
                const data = await response.json();
                if (txtTransacciones) txtTransacciones.textContent = data.total_transacciones;
                
                
                if (data.total_ahorros && txtAhorros) {
                    saldoAhorros = data.total_ahorros;
                    txtAhorros.textContent = `$ ${saldoAhorros.toFixed(2)}`;
                }
            } else {
                console.log("El backend respondió con error, manteniendo datos por defecto.");
            }
        } catch (error) {
            console.log("Backend no disponible temporalmente. Modo local activo.");
        }
    }

    
    cargarMetricas();

    
    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('token');
        window.location.href = 'index.html';
    });
</script>
</body>
</html>
