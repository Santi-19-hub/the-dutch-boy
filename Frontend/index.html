<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Dutch Boy - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center font-sans">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">The Dutch Boy</h1>
            <p class="text-gray-600 text-sm">Ingresa tus credenciales para acceder al sistema</p>
        </div>

        <form id="loginForm" class="space-y-6">
            
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Nombre de usuario</label>
                <input type="text" id="username" name="username" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors"
                    placeholder="Ej. santidev">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                <input type="password" id="password" name="password" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors"
                    placeholder="••••••••">
            </div>

            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-md transition-colors shadow">
                Iniciar Sesión
            </button>
        </form>

        <div id="responseMessage" class="mt-4 text-center text-sm font-medium hidden"></div>

    </div>

    <script>
        const form = document.getElementById('loginForm');
        const messageDiv = document.getElementById('responseMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault(); 
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            
            messageDiv.classList.add('hidden');
            messageDiv.className = "mt-4 text-center text-sm font-medium hidden";

            try {
                
                const response = await fetch('http://127.0.0.1:8000/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    
                    messageDiv.textContent = "¡Ingreso exitoso! Redireccionando...";
                    messageDiv.classList.remove('hidden');
                    messageDiv.classList.add('text-green-600');
                    
            
                    localStorage.setItem('token', data.access_token);
                    
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                    
                } else {
                    
                    messageDiv.textContent = data.detail || "Error al iniciar sesión";
                    messageDiv.classList.remove('hidden');
                    messageDiv.classList.add('text-red-600');
                }

            } catch (error) {
                
                messageDiv.textContent = "No se pudo conectar con el servidor.";
                messageDiv.classList.remove('hidden');
                messageDiv.classList.add('text-red-600');
            }
        });
    </script>
</body>
</html>
